<svg viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg" fill="none">
    <rect width="400" height="280" rx="12" fill="#f4f6fb"/>

    <!-- Timer bar -->
    <rect x="20" y="16" width="360" height="8" rx="4" fill="#e2e8f0"/>
    <rect x="20" y="16" width="200" height="8" rx="4" fill="#43a047"/>

    <!-- Cluster 1 centred ~(125, 148) -->
    <circle cx="112" cy="135" r="7" fill="#5c7cfa"/>
    <circle cx="130" cy="150" r="7" fill="#5c7cfa"/>
    <circle cx="119" cy="165" r="7" fill="#5c7cfa"/>
    <circle cx="143" cy="140" r="7" fill="#5c7cfa"/>
    <circle cx="136" cy="160" r="7" fill="#5c7cfa"/>
    <circle cx="107" cy="153" r="7" fill="#5c7cfa"/>
    <circle cx="147" cy="157" r="7" fill="#5c7cfa"/>
    <circle cx="126" cy="143" r="7" fill="#5c7cfa"/>

    <!-- Cluster 2 centred ~(268, 138) -->
    <circle cx="255" cy="126" r="7" fill="#5c7cfa"/>
    <circle cx="272" cy="142" r="7" fill="#5c7cfa"/>
    <circle cx="260" cy="157" r="7" fill="#5c7cfa"/>
    <circle cx="284" cy="132" r="7" fill="#5c7cfa"/>
    <circle cx="278" cy="152" r="7" fill="#5c7cfa"/>
    <circle cx="250" cy="144" r="7" fill="#5c7cfa"/>
    <circle cx="287" cy="148" r="7" fill="#5c7cfa"/>
    <circle cx="265" cy="136" r="7" fill="#5c7cfa"/>

    <!-- Outlier (bottom-right, clearly isolated) -->
    <circle cx="338" cy="222" r="7" fill="#fb8c00"/>
    <circle cx="338" cy="222" r="14" stroke="#fb8c00" stroke-width="1.5" stroke-opacity="0.3"/>

    <!-- Caption -->
    <text x="200" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8892a0" text-anchor="middle">Click the outlier before time runs out</text>
</svg>
