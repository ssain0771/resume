<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Web Games Lab preview</title>
  <desc id="desc">Abstract illustration showing browser cards and colourful tiles for a web games collection.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#ccfbf1"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2f6fed"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" rx="40" fill="url(#bg)"/>
  <rect x="150" y="130" width="1300" height="640" rx="36" fill="#ffffff" opacity="0.92"/>
  <rect x="210" y="190" width="420" height="520" rx="28" fill="url(#card)" opacity="0.95"/>
  <rect x="690" y="220" width="650" height="90" rx="22" fill="#e2e8f0"/>
  <rect x="690" y="355" width="280" height="280" rx="28" fill="#f59e0b" opacity="0.82"/>
  <rect x="1020" y="355" width="280" height="280" rx="28" fill="#60a5fa" opacity="0.82"/>
  <circle cx="470" cy="310" r="86" fill="#ffffff" opacity="0.92"/>
  <circle cx="470" cy="310" r="58" fill="#2f6fed" opacity="0.95"/>
  <text x="320" y="575" font-family="Inter, Arial, sans-serif" font-size="86" font-weight="700" fill="#ffffff">Web Games</text>
</svg>
