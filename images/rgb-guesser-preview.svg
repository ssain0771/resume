<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">RGB Step Guesser preview</title>
  <desc id="desc">Abstract illustration of an RGB value card beside a colourful answer grid.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" rx="40" fill="url(#bg)"/>
  <rect x="140" y="140" width="1320" height="620" rx="36" fill="#ffffff" opacity="0.94"/>
  <rect x="220" y="230" width="420" height="430" rx="28" fill="#111827"/>
  <text x="275" y="355" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="700" fill="#93c5fd">TARGET RGB</text>
  <text x="275" y="460" font-family="Inter, Arial, sans-serif" font-size="78" font-weight="800" fill="#ffffff">RGB(84, 142, 203)</text>
  <g transform="translate(740 220)">
    <rect width="180" height="180" rx="26" fill="#4f46e5"/>
    <rect x="220" width="180" height="180" rx="26" fill="#0ea5e9"/>
    <rect x="440" width="180" height="180" rx="26" fill="#22c55e"/>
    <rect width="180" height="180" y="220" rx="26" fill="#eab308"/>
    <rect x="220" y="220" width="180" height="180" rx="26" fill="#f97316"/>
    <rect x="440" y="220" width="180" height="180" rx="26" fill="#ef4444"/>
  </g>
</svg>
